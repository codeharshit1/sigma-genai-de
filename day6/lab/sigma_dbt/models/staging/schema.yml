version: 2

sources:
  - name: sigma_analytics
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
        description: "Raw transaction records"
      - name: dim_merchant
        description: "Raw merchant dimension records"
      - name: dim_customer
        description: "Raw customer dimension records"

models:
  - name: stg_transactions
    description: "Cleaned and staged transaction data"
    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests:
          - not_null
          - unique
      - name: amount
        description: "Amount in USD"
        tests:
          - not_null
      - name: status
        description: "Status of the transaction (completed, failed, pending)"
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'failed', 'pending']
          - invalid_status_check:
              invalid_values: ['CANCELLED']
      - name: merchant_id
        description: "Foreign key referencing dim_merchant"
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key referencing dim_customer"
        tests:
          - not_null
      - name: transaction_date
        description: "Date of transaction"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method (credit_card, debit_card, upi)"
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'debit_card', 'upi']
