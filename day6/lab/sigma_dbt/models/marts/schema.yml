version: 2

models:
  - name: mart_merchant_performance
    description: "Aggregated KPIs for merchants including total revenue, transaction counts, failure rates, and average transaction values."
    columns:
      - name: merchant_id
        description: "Unique identifier for the merchant."
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: "Name of the merchant."
        tests:
          - not_null
      - name: category
        description: "Category of the merchant."
        tests:
          - accepted_values:
              values:
                - Food Delivery
                - E-Commerce
                - Entertainment
                - Travel
                - Grocery
      - name: city
        description: "City where the merchant is located."
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by the merchant from completed transactions."
      - name: failure_rate_pct
        description: "Failure rate percentage for the merchant."
        tests:
          - is_between:
              min_value: 0
              max_value: 100

  - name: mart_transaction_summary
    description: "Mart containing summarized transaction data including revenue, failure rate, and merchant details."
    columns:
      - name: merchant_id
        description: "Unique identifier for each merchant."
        tests:
          - not_null
      - name: merchant_name
        description: "Name of the merchant associated with the transactions."
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue from completed transactions."
      - name: failure_rate_pct
        description: "Percentage of failed transactions."
        tests:
          - is_between:
              min_value: 0
              max_value: 100
      - name: transaction_count
        description: "Total number of transactions."
        tests:
          - not_null
